{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-redactua-primary fw-bold mb-0">Alta de Expediente</h2>
</div>

<div class="row">
    <div class="col-12 col-lg-8">
        <div class="card shadow-sm border-0 bg-white rounded-4">
            <div class="card-body p-4">
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-4">
                            <label class="fw-bold mb-2 text-dark">{{ field.label }}</label>
                            {{ field }}
                            
                            {% if field.help_text %}
                                <div class="form-text small text-muted mt-1">
                                    <i class="bi bi-info-circle me-1"></i>{{ field.help_text }}
                                </div>
                            {% endif %}
                            
                            {% for error in field.errors %}
                                <div class="text-danger small mt-1 fw-bold">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}

                    <div class="d-flex justify-content-end gap-2 mt-5 border-top pt-4">
                        <a href="{% url 'family_case_list' %}" class="btn btn-outline-dark rounded-pill px-4 fw-semibold">Cancelar</a>
                        <button type="submit" class="btn btn-success rounded-pill px-4 fw-semibold text-white">
                            Guardar Expediente
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
