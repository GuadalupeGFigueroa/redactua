{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedActúa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    {%if user.is_authenticated %}
    <nav class="navbar navbar-dark bg-redactua-primary px-3">
        <div class="d-flex align-items-center">
            <button class="navbar-toggler me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral" aria-controls="menuLateral">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fw-bold mb-0" href="#">RedActúa</a>
        </div>

    <!-- Menú superior -->
        <div class="d-flex text-white">
            <a href="#" class="nav-link text-white me-3" title="Inicio"><i class="bi bi-house-door fs-5"></i></a>
            <a href="#" class="nav-link text-white me-3" title="Mensajes"><i class="bi bi-envelope fs-5"></i></a>
            <a href="#" class="nav-link text-white me-3" title="Perfil"><i class="bi bi-person-circle fs-5"></i></a>
            <a href="#" class="nav-link text-warning" title="Cerrar Sesión"><i class="bi bi-box-arrow-right fs-5"></i></a>
        </div>
    </nav>

    <!-- Menu lateral -->
    <div class="offcanvas offcanvas-start bg-light" tabindex="-1" id="menuLateral" aria-labelledby="menuLateralLabel">
        <div class="offcanvas-header bg-redactua-primary text-white">
            <h5 class="offcanvas-title fw-bold" id="menuLateralLabel">Menú RedActúa</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav flex-column fs-5">
                <li class="nav-item mb-2">
                    <a class="nav-link text-dark" href="#"><i class="bi bi-folder2-open me-2 text-redactua-primary"></i> Expedientes</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-dark" href="#"><i class="bi bi-people me-2 text-redactua-primary"></i> Usuarios</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-dark" href="#"><i class="bi bi-journal-text me-2 text-redactua-primary"></i> Actividades</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-dark" href="{% url 'attendance' %}"><i class="bi bi-calendar-check me-2 text-redactua-primary"></i> Asistencia</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-dark" href="#"><i class="bi bi-telephone me-2 text-redactua-primary"></i> Contactos</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-dark" href="#"><i class="bi bi-bar-chart me-2 text-redactua-primary"></i> Estadísticas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark" href="#"><i class="bi bi-person-badge me-2 text-redactua-primary"></i> Trabajadores</a>
                </li>
            </ul>
        </div>
    </div>

    {% endif %}
    
    <main class="container mt-4 mb-5">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
