{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-12 col-md-6 col-lg-4">
        
        <div class="card shadow-sm border-0 rounded-4 p-4 text-center bg-white">
            
            <div class="mb-4">
                <h1 class="text-redactua-primary fw-bold mb-1">RedActúa</h1>
                <p class="text-muted small">Gestión de Intervención Social</p>
            </div>

            <form method="POST" action="">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger py-2 small text-center rounded-3 mb-3">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>Usuario o contraseña incorrectos.
                    </div>
                {% endif %}
                
                <div class="form-floating mb-3 text-start">
                    <input type="text" class="form-control bg-light border-0" id="username" name="username" placeholder="Usuario" required>
                    <label for="username" class="text-muted"><i class="bi bi-person me-2"></i>Usuario</label>
                </div>
                
                <div class="form-floating mb-4 text-start">
                    <input type="password" class="form-control bg-light border-0" id="password" name="password" placeholder="Contraseña" required>
                    <label for="password" class="text-muted"><i class="bi bi-lock me-2"></i>Contraseña</label>
                </div>

                <button type="submit" class="btn btn-asiste w-100 py-3 rounded-3 fw-bold fs-5">
                    Entrar
                </button>
            </form>

        </div>
        
    </div>
</div>
{% endblock %}
