{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - RedActúa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajuste para que ocupe el 100% de la altura de la pantalla */
        .login-wrapper {
            min-height: 100vh;
        }
        /* Color oscuro del lado izquierdo del mockup */
        .bg-left-panel {
            background-color: #1A1A1A; 
        }
        /* Tarjeta de login con tu Verde Principal */
        .login-card {
            background-color: #3A4E40;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        /* Inputs redondeados y sin borde según mockup */
        .custom-input {
            border: none;
            border-radius: 8px;
            padding: 12px;
            background-color: #F8F9FA;
        }
        /* Botón Mostaza */
        .btn-mustard {
            background-color: #E7C573;
            color: #1A1A1A;
            border-radius: 8px;
        }
        .btn-mustard:hover {
            background-color: #D4B260;
            color: #1A1A1A;
        }
    </style>
</head>
<body>

    <div class="container-fluid p-0 m-0">
        <div class="row g-0 login-wrapper">
            
            <div class="col-md-6 bg-left-panel d-flex align-items-center justify-content-center p-5 text-center text-md-start">
                <div>
                    <h1 class="text-white display-3 fw-bold" style="font-family: Arial, sans-serif; letter-spacing: -1px;">
                        BIENVENID@<br>
                        A <span style="color: #839B88;">RED</span><span style="color: #E7C573;">ACTÚA!</span>
                    </h1>
                </div>
            </div>

            <div class="col-md-6 bg-white d-flex flex-column align-items-center justify-content-center p-5">
                
                <img src="{% static 'img/logo_redactua.png' %}" alt="Logo RedActúa" class="img-fluid mb-5" style="max-width: 250px;">
                
                <div class="login-card p-4 p-md-5 w-100" style="max-width: 450px;">
                    <h3 class="fw-bold mb-4" style="color: #E7C573;">Iniciar sesión</h3>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="fw-semibold mb-2" style="color: #E7C573;">Usuario/a</label>
                            <input type="text" name="username" class="form-control custom-input" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="fw-semibold mb-2" style="color: #E7C573;">Contraseña</label>
                            <input type="password" name="password" class="form-control custom-input" required>
                        </div>
                        <div class="text-end mb-4">
                            <p class="text-white text-decoration-none small">Si ha olvidado su contraseña, contacte con su administrador.</p>
                        </div>

                        {% if form.errors %}
                            <p class="text-white small mb-3"><i class="bi bi-exclamation-circle me-1"></i> Usuario o contraseña incorrectos.</p>
                        {% endif %}

                        <button type="submit" class="btn btn-mustard w-100 py-2 fw-bold fs-5">Enviar</button>

                    </form>
                </div>

            </div>
            
        </div>
    </div>

</body>
</html>
