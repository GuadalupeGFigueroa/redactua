{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="card shadow border-0 rounded-4" style="max-width: 500px; border-top: 5px solid #C0392B !important;">
        <div class="card-body p-5 text-center">
            
            <i class="bi bi-exclamation-triangle display-1 mb-3" style="color: #C0392B;"></i>

            <h3 class="fw-bold mb-3">¿Quieres eliminar esta ficha?</h3>

            <p class="text-muted">Estás a punto de eliminar a 
                <strong>{{ beneficiary.first_name }} {{ beneficiary.last_name1 }}.</strong> Esta acción no se puede deshacer.
            </p>

            <form method="POST">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'beneficiary_detail' beneficiary.id %}" class=""btn btn-light border fw-semibold px-4">
                        Cancelar
                    </a>
                    <button type="submit" class="btn text-white fw-semibold px-4" style="background-color:#C0392B">
                        Sí, eliminar definitivamente
                    </button>
                </div>
            </form>

        </div>
</div>
{% endblock content %}
